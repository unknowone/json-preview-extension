<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>JSON 预览助手</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="toolbar">
    <div class="title">JSON 预览</div>
    <div class="actions">
      <button id="btn-format" title="格式化 (Ctrl+Enter)">格式化</button>
      <button id="btn-minify" title="压缩">压缩</button>
      <button id="btn-copy" title="复制结果">复制</button>
      <button id="btn-clear" title="清空">清空</button>
    </div>
  </header>

  <main class="workspace">
    <section class="pane input-pane">
      <label class="pane-title">输入</label>
      <textarea
        id="input"
        spellcheck="false"
        placeholder='在此粘贴 JSON，例如：{"name":"claude","ok":true}'
      ></textarea>
    </section>

    <section class="pane output-pane">
      <div class="pane-header">
        <label class="pane-title">预览</label>
        <input
          id="search"
          type="search"
          placeholder="搜索 key 或 value..."
          autocomplete="off"
        />
      </div>
      <div id="output" class="output" tabindex="0"></div>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
