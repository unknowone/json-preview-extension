<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JSON 预览助手</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header class="toolbar">
    <div class="brand">
      <span class="logo">{ }</span>
      <span class="title">JSON 预览助手</span>
    </div>
    <div class="actions">
      <button id="btn-format" title="格式化 (Ctrl/⌘ + Enter)">格式化</button>
      <button id="btn-minify" title="压缩为单行">压缩</button>
      <button id="btn-copy" title="复制格式化后的 JSON">复制</button>
      <button id="btn-expand" title="全部展开">全部展开</button>
      <button id="btn-collapse" title="全部折叠">全部折叠</button>
      <button id="btn-clear" title="清空">清空</button>
    </div>
  </header>

  <main class="workspace">
    <section class="pane input-pane">
      <div class="pane-header">
        <span class="pane-title">原文本</span>
        <span id="input-meta" class="meta"></span>
      </div>
      <textarea
        id="input"
        spellcheck="false"
        placeholder='在此粘贴 JSON，例如：{"name":"claude","ok":true}&#10;&#10;快捷键：Ctrl/⌘ + Enter 格式化'
      ></textarea>
    </section>

    <div class="splitter" id="splitter" title="拖动调整左右比例"></div>

    <section class="pane output-pane">
      <div class="pane-header">
        <span class="pane-title">预览结果</span>
        <input
          id="search"
          type="search"
          placeholder="搜索 key 或 value..."
          autocomplete="off"
        />
      </div>
      <div id="output" class="output" tabindex="0"></div>
    </section>
  </main>

  <footer id="status" class="status"></footer>

  <script src="index.js"></script>
</body>
</html>
